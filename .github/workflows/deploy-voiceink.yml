name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'VoiceInk/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: VoiceInk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: VoiceInk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # /evenG2/ for github.io/<repo> path; use / for custom domain
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/evenG2/' }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: VoiceInk/dist
          # Uncomment to use a custom domain:
          # cname: voiceink.example.com
